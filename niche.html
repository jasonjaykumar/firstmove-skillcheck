<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>First Move — Your Niches</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--cream:#E8E6E0;--black:#0A0A0A;--muted:#6B6B6B;--divider:#C8C6C0;--secondary:#4A4A4A;}
html,body{width:100%;min-height:100%;background:var(--cream);font-family:'Space Grotesk',sans-serif;cursor:none;overflow-x:hidden;}

#cursor{position:fixed;width:10px;height:10px;background:var(--black);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .15s,height .15s;mix-blend-mode:difference;}
#cursor.big{width:40px;height:40px;}

body::before{content:'';position:fixed;inset:-50%;width:200%;height:200%;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
opacity:.2;animation:grain .35s steps(1) infinite;pointer-events:none;z-index:0;}
@keyframes grain{0%,100%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}20%{transform:translate(3%,1%)}
30%{transform:translate(-1%,4%)}40%{transform:translate(2%,-2%)}50%{transform:translate(-3%,2%)}
60%{transform:translate(1%,-4%)}70%{transform:translate(-2%,3%)}80%{transform:translate(3%,-1%)}90%{transform:translate(-1%,2%)}};

/* ── FLASH OVERLAY ── */
#flash{position:fixed;inset:0;background:var(--black);z-index:80;opacity:0;pointer-events:none;}

/* ── NAV ── */
#top-nav{
  position:sticky;top:0;z-index:50;
  background:var(--cream);
  padding:20px 52px 0;
  border-bottom:1px solid var(--divider);
}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.05em;color:var(--black);}
.nav-right{display:flex;align-items:center;gap:20px;}
.nav-hustle{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:6px 14px;border:1px solid var(--divider);border-radius:50px;}
.progress-bar-wrap{height:2px;background:var(--divider);overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--black);width:40%;transition:width .6s cubic-bezier(.22,1,.36,1);}

/* ── PAGE ── */
#page{max-width:680px;margin:0 auto;padding:48px 52px 100px;position:relative;z-index:1;perspective:1200px;}

/* ── HERO ── */
.hero{margin-bottom:52px;}
.hero-eyebrow{
  font-size:10px;letter-spacing:.35em;text-transform:uppercase;
  color:var(--muted);font-weight:400;margin-bottom:16px;
  opacity:0;transform:translateY(12px);
  transition:opacity .6s ease,transform .6s ease;
}
.hero-eyebrow.go{opacity:1;transform:translateY(0);}
.hero-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(44px,9vw,80px);
  color:var(--black);line-height:.92;letter-spacing:.01em;
  margin-bottom:16px;
  opacity:0;transform:translateY(20px);
  transition:opacity .7s ease .1s,transform .7s cubic-bezier(.22,1,.36,1) .1s;
}
.hero-title.go{opacity:1;transform:translateY(0);}
.hero-sub{
  font-size:14px;color:var(--secondary);font-weight:300;line-height:1.7;
  max-width:480px;
  opacity:0;transform:translateY(12px);
  transition:opacity .6s ease .25s,transform .6s ease .25s;
}
.hero-sub.go{opacity:1;transform:translateY(0);}

/* ── NICHE CARDS ── */
.niche-list{display:flex;flex-direction:column;gap:20px;margin-bottom:52px;}

/* ── TIMELINE ── */
.niche-list{position:relative;}
.niche-list::before{
  content:'';
  position:absolute;
  left:-28px;top:20px;bottom:20px;
  width:1.5px;background:var(--divider);
  z-index:0;
}
.timeline-fill{
  position:absolute;
  left:-28px;top:20px;
  width:1.5px;height:0%;
  background:var(--black);
  transition:height .6s cubic-bezier(.22,1,.36,1);
  z-index:1;
}
.timeline-dot{
  position:absolute;
  left:-35px;
  width:16px;height:16px;border-radius:50%;
  border:2px solid var(--divider);
  background:var(--cream);
  z-index:2;
  top:28px;
  transition:border-color .4s ease, background .4s ease, transform .4s ease;
}
.timeline-dot.active{border-color:var(--black);background:var(--black);transform:scale(1.2);}
.timeline-dot.done{border-color:var(--secondary);background:var(--secondary);}

/* ── NICHE CARDS ── */
.niche-card{
  border:1.5px solid var(--divider);border-radius:20px;
  overflow:hidden;position:relative;
  opacity:0;
  transition:border-color .3s ease, box-shadow .3s ease;
  cursor:none;
  /* 3D perspective setup */
  transform-style:preserve-3d;
  will-change:transform;
}
/* alternating slide directions set in JS */
.niche-card:hover{border-color:var(--secondary);}
.niche-card.selected{border-color:var(--black);border-width:2px;box-shadow:0 8px 40px rgba(10,10,10,.12);}

/* dimmed state when another is selected */
.niche-card.dimmed{
  opacity:.3;
  filter:blur(.4px);
  transform:scale(.98) translateX(0) !important;
  pointer-events:none;
  transition:opacity .5s ease, filter .5s ease, transform .5s ease;
}
/* chosen card steps forward */
.niche-card.chosen{
  transform:scale(1.01) translateY(-4px) !important;
  box-shadow:0 16px 56px rgba(10,10,10,.15);
  border-color:var(--black);
  border-width:2px;
  transition:transform .5s cubic-bezier(.22,1,.36,1), box-shadow .5s ease, border-color .3s;
}

/* card header */
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px 16px;
  border-bottom:1px solid var(--divider);
  cursor:none;
}
.card-num{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.1em;color:var(--muted);}
.card-status{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:6px;}
.card-status-dot{width:5px;height:5px;border-radius:50%;background:var(--divider);}
.card-status.unlocked .card-status-dot{background:var(--secondary);}
.card-status.selected-status .card-status-dot{background:var(--black);}

/* card body — hidden until revealed */
.card-body{
  padding:24px;
  opacity:0;transform:translateY(12px);
  transition:opacity .5s ease,transform .5s cubic-bezier(.22,1,.36,1);
  pointer-events:none;
}
.card-body.visible{opacity:1;transform:translateY(0);pointer-events:auto;}

/* blurred name shown before reveal */
.card-name-blur{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(28px,5vw,44px);
  color:transparent;
  background:var(--divider);
  border-radius:6px;padding:2px 12px;
  display:inline-block;
  filter:blur(5px);
  letter-spacing:.01em;line-height:1;
  margin-bottom:16px;
  transition:filter .6s ease,color .5s ease,background .5s ease,padding .5s ease,border-radius .5s ease;
}
.card-name-blur.revealed{
  filter:blur(0);color:var(--black);
  background:transparent;padding:0;border-radius:0;
}

/* reveal button */
.card-reveal-btn{
  background:transparent;border:1.5px solid var(--divider);color:var(--secondary);
  padding:10px 22px;border-radius:50px;
  font-family:'Space Grotesk',sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;
  cursor:none;margin-left:12px;margin-bottom:16px;
  transition:border-color .2s,color .2s,transform .2s;display:inline-block;
}
.card-reveal-btn:hover{border-color:var(--black);color:var(--black);transform:translateX(3px);}
.card-reveal-btn.hidden{display:none;}

.niche-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(28px,5vw,44px);
  color:var(--black);line-height:.95;letter-spacing:.01em;
  margin-bottom:20px;
}
.niche-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.niche-tag{
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;
  padding:5px 12px;border-radius:50px;
  border:1px solid var(--divider);color:var(--secondary);
}

/* niche sections */
.niche-section{margin-bottom:20px;}
.niche-section-label{
  font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.niche-section-label::after{content:'';flex:1;height:1px;background:var(--divider);}
.niche-section p{font-size:13px;color:var(--secondary);line-height:1.78;font-weight:300;}

/* two col stats */
.niche-stats{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--divider);border-radius:12px;overflow:hidden;}
.niche-stat{flex:1;padding:14px 16px;text-align:center;}
.niche-stat:not(:last-child){border-right:1px solid var(--divider);}
.niche-stat-label{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.niche-stat-value{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--black);letter-spacing:.02em;}

/* select button */
.card-select-btn{
  width:100%;background:var(--black);color:var(--cream);
  border:none;padding:16px 24px;border-radius:50px;
  font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;
  cursor:none;margin-top:20px;
  opacity:0;transform:translateY(6px);pointer-events:none;
  transition:opacity .4s ease,transform .4s ease,box-shadow .2s;
}
.card-select-btn.visible{opacity:1;transform:translateY(0);pointer-events:auto;}
.card-select-btn:hover{transform:translateY(-2px)!important;box-shadow:0 8px 28px rgba(10,10,10,.18);}
.card-select-btn.chosen{background:var(--secondary);pointer-events:none;}

/* ── CONFIRMATION MODAL ── */
#modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(10,10,10,.6);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:32px;
  opacity:0;pointer-events:none;transition:opacity .3s ease;
}
#modal-overlay.active{opacity:1;pointer-events:auto;}
.modal-box{
  background:var(--cream);border:1.5px solid var(--divider);border-radius:24px;
  padding:36px;max-width:460px;width:100%;
  max-height:88vh;overflow-y:auto;
  transform:translateY(20px) scale(.97);
  transition:transform .35s cubic-bezier(.22,1,.36,1);
}
#modal-overlay.active .modal-box{transform:translateY(0) scale(1);}
.modal-label{font-size:9px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.modal-niche-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,6vw,54px);color:var(--black);line-height:.93;letter-spacing:.01em;margin-bottom:20px;}
.modal-divider{height:1px;background:var(--divider);margin-bottom:18px;}
.modal-summary-label{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.modal-summary{font-size:13px;color:var(--secondary);line-height:1.75;font-weight:300;margin-bottom:24px;}
.modal-confirm{width:100%;background:var(--black);color:var(--cream);border:none;padding:16px;border-radius:50px;font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;cursor:none;margin-bottom:10px;transition:transform .2s,box-shadow .2s;}
.modal-confirm:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(10,10,10,.18);}
.modal-back{width:100%;background:transparent;color:var(--muted);border:1.5px solid var(--divider);padding:14px;border-radius:50px;font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;cursor:none;transition:border-color .2s,color .2s;}
.modal-back:hover{border-color:var(--secondary);color:var(--secondary);}

/* ── SCROLL REVEAL ── */
@keyframes cardIn{to{opacity:1;transform:translateY(0);}}

/* ─── LOADING SCREEN ─────────────────────────────────────────────────────────── */
.fm-loading{
  position:fixed;inset:0;z-index:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg, #E8E6E0);gap:28px;
  transition:opacity 0.6s ease, visibility 0.6s ease;
}
.fm-loading.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.fm-loading-wordmark{
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.2em;
  color:rgba(10,10,10,0.3);margin-bottom:8px;
}
[data-theme="dark"] .fm-loading-wordmark{color:rgba(232,230,224,0.3);}
.fm-loading-msg{
  font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:300;
  color:rgba(10,10,10,0.6);text-align:center;max-width:340px;line-height:1.6;
  min-height:48px;transition:opacity 0.4s;
}
[data-theme="dark"] .fm-loading-msg{color:rgba(232,230,224,0.6);}
.fm-loading-bar{
  width:200px;height:1px;background:rgba(10,10,10,0.12);border-radius:1px;overflow:hidden;
}
[data-theme="dark"] .fm-loading-bar{background:rgba(232,230,224,0.12);}
.fm-loading-fill{
  height:100%;background:#0A0A0A;border-radius:1px;
  animation:fmBarSlide 1.8s ease-in-out infinite;
}
[data-theme="dark"] .fm-loading-fill{background:#E8E6E0;}
@keyframes fmBarSlide{
  0%{width:0%;margin-left:0}
  50%{width:55%;margin-left:22%}
  100%{width:0%;margin-left:100%}
}
.fm-loading-retry{
  display:none;font-family:'Space Grotesk',sans-serif;font-size:12px;
  font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:#0A0A0A;background:transparent;border:1px solid rgba(10,10,10,0.3);
  border-radius:4px;padding:10px 24px;cursor:pointer;margin-top:8px;
}
[data-theme="dark"] .fm-loading-retry{color:#E8E6E0;border-color:rgba(232,230,224,0.3);}
.fm-loading-retry:hover{opacity:0.7;}

</style>


<script>
// ─── LOADING SCREEN MANAGER ───────────────────────────────────────────────────
var fmLoadingMsgs = [
  [0,   'Building your results...'],
  [15,  'Claude is being thorough — almost there...'],
  [35,  'Taking a little longer than usual — still on it...'],
  [60,  'Nearly done — this one needed extra thought...'],
  [100, 'Still going — hang tight just a moment more...'],
];
var fmLoadingTimer = 0;
var fmLoadingInterval = null;

function fmStartLoading(){
  fmLoadingTimer = 0;
  fmLoadingInterval = setInterval(function(){
    fmLoadingTimer++;
    var msg = document.getElementById('fm-loading-msg');
    if(!msg) return;
    for(var i = fmLoadingMsgs.length-1; i >= 0; i--){
      if(fmLoadingTimer >= fmLoadingMsgs[i][0]){
        msg.textContent = fmLoadingMsgs[i][1];
        break;
      }
    }
    // After 3 minutes show retry
    if(fmLoadingTimer >= 180){
      clearInterval(fmLoadingInterval);
      var retry = document.getElementById('fm-loading-retry');
      var msgEl = document.getElementById('fm-loading-msg');
      if(retry) retry.style.display='block';
      if(msgEl) msgEl.textContent = 'Something took too long. Your data may still be generating.';
    }
  }, 1000);
}

function fmHideLoading(){
  clearInterval(fmLoadingInterval);
  var el = document.getElementById('fm-loading');
  if(el) el.classList.add('hidden');
}

// Start loading timer on page load
fmStartLoading();
</script>
</head>
<body>
<div id="cursor"></div>
<div id="flash"></div>

<!-- NAV -->
<div id="top-nav">
  <div class="nav-row">
    <span class="nav-logo">First Move</span>
    <div class="nav-right">
      <span class="nav-hustle" id="nav-hustle">Your Hustle</span>
    </div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>
</div>

<!-- PAGE -->
<div id="page">
  <div class="hero">
    <div class="hero-eyebrow" id="hero-eyebrow">Step 2 of 5 — Niche</div>
    <h1 class="hero-title" id="hero-title">Now find<br>your corner.</h1>
    <p class="hero-sub" id="hero-sub">The hustle is the door. These are the keys. Four niches — each one a specific market where your hustle becomes rare. Pick the one that fits your life, your city, your instincts.</p>
  </div>

  <div class="niche-list" id="niche-list">
  <div class="timeline-fill" id="timeline-fill"></div>
</div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal-box">
    <div class="modal-label">Your chosen niche</div>
    <div class="modal-niche-name" id="modal-name"></div>
    <div class="modal-divider"></div>
    <div class="modal-summary-label">Why this is your corner</div>
    <p class="modal-summary" id="modal-summary"></p>
    <button class="modal-confirm" id="modal-confirm">This is my corner</button>
    <button class="modal-back" id="modal-back">Go back and reconsider</button>
  </div>
</div>

<script>
// ── CURSOR
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';});
document.addEventListener('mouseover', e=>{cursor.classList.toggle('big',!!e.target.closest('button,.niche-card'));});

// ── PARAMS
const params = new URLSearchParams(window.location.search);
const hustleName = params.get('hustle') || 'Social Media Management';
const recordId   = params.get('id') || '';
const userName   = params.get('name') || '';

document.getElementById('nav-hustle').textContent = hustleName;

// ── AIRTABLE FETCH + PARSER
const WORKER = 'https://firstmove-airtable.joinfirstmove.workers.dev';
let NICHES = [];
let nichesRendered = false;
let nichePolls = 0;
let AIRTABLE_FIELDS = {}; // stores all fields for webhook

function cleanStr(s){ return (s||'').replace(/\*\*/g,'').replace(/\*/g,'').replace(/^#+\s*/gm,'').trim(); }

function parseNiches(raw){
  const blocks = raw.split(/\n?---\n?/).filter(b=>b.trim().length>20);
  return blocks.slice(0,4).map(block=>{
    const get = (key) => {
      const re = new RegExp(key+':\\s*([\\s\\S]*?)(?=\\n[A-Z_]{2,}:|$)');
      const m = block.match(re);
      return m ? cleanStr(m[1]) : '';
    };
    const tagsRaw = get('TAGS');
    const tags = tagsRaw.split('|').map(t=>t.trim()).filter(t=>t.length>0);
    return {
      name:        get('NICHE_NAME'),
      tags:        tags,
      demand:      get('DEMAND'),
      competition: get('COMPETITION'),
      avgBudget:   get('AVG_BUDGET'),
      whyFits:     get('WHY_FITS'),
      whyIndia:    get('WHY_INDIA'),
      whyNow:      get('WHY_NOW'),
      summary:     get('SUMMARY')
    };
  });
}

function buildNicheCards(){
  if(nichesRendered) return;
  nichesRendered = true;
  const list = document.getElementById('niche-list');
  list.innerHTML = '';
  NICHES.forEach((n,i)=>{
    const card = document.createElement('div');
    card.className = 'niche-card';
    card.id = `niche-${i}`;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-num">0${i+1}</span>
        <div class="card-status" id="status-${i}">
          <div class="card-status-dot"></div>
          <span id="status-text-${i}">Locked</span>
        </div>
      </div>
      <div style="padding:20px 24px 4px;">
        <div class="card-name-blur" id="blur-${i}">${n.name}</div>
        <button class="card-reveal-btn" id="reveal-btn-${i}" data-i="${i}">Reveal this niche →</button>
      </div>
      <div class="card-body" id="body-${i}">
        <div class="niche-name">${n.name}</div>
        <div class="niche-tags">${n.tags.map(t=>`<span class="niche-tag">${t}</span>`).join('')}</div>
        <div class="niche-stats">
          <div class="niche-stat"><div class="niche-stat-label">Demand</div><div class="niche-stat-value">${n.demand}</div></div>
          <div class="niche-stat"><div class="niche-stat-label">Competition</div><div class="niche-stat-value">${n.competition}</div></div>
          <div class="niche-stat"><div class="niche-stat-label">Avg Budget</div><div class="niche-stat-value" style="font-size:13px;padding-top:3px;">${n.avgBudget}</div></div>
        </div>
        <div class="niche-section">
          <div class="niche-section-label">Why it fits you</div>
          <p>${n.whyFits}</p>
        </div>
        <div class="niche-section">
          <div class="niche-section-label">Why India needs this now</div>
          <p>${n.whyIndia}</p>
        </div>
        <div class="niche-section">
          <div class="niche-section-label">Why now</div>
          <p>${n.whyNow}</p>
        </div>
        <button class="card-select-btn" id="select-btn-${i}" data-i="${i}">This is my niche →</button>
      </div>
    `;
    list.appendChild(card);
  });

  // rebuild timeline dots
  const listEl = document.getElementById('niche-list');
  NICHES.forEach((_,i)=>{
    const dot = document.createElement('div');
    dot.className='timeline-dot'; dot.id=`tdot-${i}`;
    listEl.appendChild(dot);
  });

  // listeners handled by event delegation on niche-list below
  setTimeout(positionDots, 300);
  updateTimeline();
}

function pollNiches(){
  if(!recordId){ buildFallbackNiches(); return; }
  fetch(`${WORKER}?id=${encodeURIComponent(recordId)}`)
    .then(r=>r.json())
    .then(data=>{
      const fields = data.fields || data;
      AIRTABLE_FIELDS = fields; // store for webhook
      const raw = fields['Niche Options'] || fields['niche_options'] || '';
      if(raw && raw.trim().length > 100){
        const parsed = parseNiches(raw);
        if(parsed.length >= 2){
          NICHES = parsed;
          fmHideLoading();
          buildNicheCards();
        } else {
          retryNiches();
        }
      } else { retryNiches(); }
    })
    .catch(retryNiches);
}

function retryNiches(){
  nichePolls++;
  if(nichePolls === 10){
    var el=document.getElementById('fm-loading-msg');
    if(el)el.textContent='Still generating your personalised results... hang tight.';
  }
  if(nichePolls < 60) setTimeout(pollNiches, 3000);
  else buildFallbackNiches();
}

// ── STATE
let revealed = [false,false,false,false];
let selectedNiche = null;

// ── POSITION DOTS (called after cards render)
function positionDots(){
  NICHES.forEach((_,i)=>{
    const card = document.getElementById(`niche-${i}`);
    const dot  = document.getElementById(`tdot-${i}`);
    if(!card||!dot) return;
    dot.style.top = (card.offsetTop + 24) + 'px';
  });
}
window.addEventListener('resize', positionDots);

// ── START POLL
setTimeout(pollNiches, 2000);

// Update timeline fill height
function updateTimeline(){
  if(!NICHES.length) return;
  const revealed_count = revealed.filter(Boolean).length;
  const total = NICHES.length;
  // fill proportional to how many cards are revealed
  const pct = total > 0 ? (revealed_count / total) * 100 : 0;
  const fill = document.getElementById('timeline-fill');
  if(fill) fill.style.height = pct + '%';
  // update dots
  NICHES.forEach((_,i)=>{
    const dot = document.getElementById(`tdot-${i}`);
    if(!dot) return;
    if(revealed[i]) dot.classList.add('done');
    else if(i === revealed.findIndex(r=>!r)) dot.classList.add('active');
  });
}

// ── 3D TILT ON MOUSE MOVE
document.addEventListener('mousemove', e=>{
  document.querySelectorAll('.niche-card.anim-done:not(.dimmed)').forEach(card=>{
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top  + rect.height/2;
    const dx = (e.clientX - cx) / (rect.width/2);
    const dy = (e.clientY - cy) / (rect.height/2);
    // Only tilt when mouse is near the card
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist < 1.4){
      const rx = dy * -5; // tilt up/down
      const ry = dx *  5; // tilt left/right
      card.style.transform = `perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg) translateZ(4px)`;
    } else {
      card.style.transform = 'perspective(800px) rotateX(0) rotateY(0) translateZ(0)';
    }
  });
});

// Reset tilt when mouse leaves
document.addEventListener('mouseleave', ()=>{
  document.querySelectorAll('.niche-card').forEach(card=>{
    card.style.transform='perspective(800px) rotateX(0) rotateY(0) translateZ(0)';
  });
});

// ── SCROLL REVEAL — alternating slide directions
function checkReveal(){
  document.querySelectorAll('.niche-card:not(.anim-done)').forEach((card,i)=>{
    const rect = card.getBoundingClientRect();
    if(rect.top < window.innerHeight * .88){
      card.classList.add('anim-done');
      // Alternating: even = from left, odd = from right
      const fromX = i % 2 === 0 ? -40 : 40;
      card.style.transform=`translateX(${fromX}px) translateY(16px)`;
      card.style.opacity='0';
      setTimeout(()=>{
        card.style.transition='opacity .7s cubic-bezier(.22,1,.36,1), transform .7s cubic-bezier(.22,1,.36,1)';
        card.style.opacity='1';
        card.style.transform='translateX(0) translateY(0)';
        setTimeout(()=>unlockCard(i), 400);
      }, i * 100);
    }
  });
}

function unlockCard(i){
  const status = document.getElementById(`status-${i}`);
  const statusText = document.getElementById(`status-text-${i}`);
  status.classList.add('unlocked');
  statusText.textContent = 'Unlocked';
  document.getElementById(`reveal-btn-${i}`)?.classList.remove('hidden');
  // activate timeline dot
  const dot = document.getElementById(`tdot-${i}`);
  if(dot&&!revealed[i]) dot.classList.add('active');
}

window.addEventListener('scroll', checkReveal, {passive:true});
setTimeout(checkReveal, 400);

// ── FLASH
const flash = document.getElementById('flash');
let shakeRAF;

function doFlash(onDone){
  flash.style.transition='opacity .12s ease';
  flash.style.opacity='1';
  // shake body
  shakeBody(18, 350);
  setTimeout(()=>{
    flash.style.transition='opacity .35s ease';
    flash.style.opacity='0';
    setTimeout(()=>{ if(onDone) onDone(); },360);
  },130);
}

function shakeBody(mag, dur){
  const el = document.getElementById('page');
  const start = Date.now();
  cancelAnimationFrame(shakeRAF);
  function frame(){
    const p=(Date.now()-start)/dur;
    const m=mag*(1-Math.pow(p,.5));
    if(p>=1||m<.2){el.style.transform='none';return;}
    el.style.transform=`translate(${(Math.random()-.5)*2*m}px,${(Math.random()-.5)*2*m}px) rotate(${(Math.random()-.5)*m*.06}deg)`;
    shakeRAF=requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ── REVEAL NICHE
document.getElementById('niche-list').addEventListener('click', e=>{
  const btn = e.target.closest('.card-reveal-btn');
  if(!btn) return;
  const i = parseInt(btn.dataset.i);
  if(revealed[i]) return;

  doFlash(()=>{
    revealed[i] = true;
    document.getElementById(`blur-${i}`).classList.add('revealed');
    btn.classList.add('hidden');
    setTimeout(()=>document.getElementById(`body-${i}`).classList.add('visible'),100);
    document.getElementById(`status-text-${i}`).textContent = 'Revealed';
    document.getElementById(`status-${i}`).classList.remove('unlocked');
    // Timeline dot → done
    const dot = document.getElementById(`tdot-${i}`);
    if(dot){dot.classList.remove('active');dot.classList.add('done');}
    updateTimeline();
    setTimeout(()=>document.getElementById(`select-btn-${i}`).classList.add('visible'),500);
  });
});

// ── SELECT NICHE — chosen steps forward, others dim
document.getElementById('niche-list').addEventListener('click', e=>{
  const btn = e.target.closest('.card-select-btn');
  if(!btn) return;
  const i = parseInt(btn.dataset.i);
  selectedNiche = i;

  // Step chosen forward, dim others
  NICHES.forEach((_,j)=>{
    const card = document.getElementById(`niche-${j}`);
    if(!card) return;
    card.classList.remove('chosen','dimmed');
    if(j===i) card.classList.add('chosen');
    else if(revealed[j]) card.classList.add('dimmed');
  });

  const n = NICHES[i];
  document.getElementById('modal-name').textContent = n.name;
  document.getElementById('modal-summary').textContent = n.summary;
  document.getElementById('modal-overlay').classList.add('active');
});

document.getElementById('modal-back').addEventListener('click',()=>{
  document.getElementById('modal-overlay').classList.remove('active');
  // restore cards
  NICHES.forEach((_,j)=>{
    const card = document.getElementById(`niche-${j}`);
    if(card){card.classList.remove('chosen','dimmed');}
  });
  selectedNiche = null;
});

// ── BREATHING BACKGROUND
(function(){
  let t=Math.random()*Math.PI*2;
  const spd=0.005+Math.random()*0.003;
  function breath(){
    t+=spd;
    const mix=(Math.sin(t)+1)/2;
    const r=Math.round(232+(222-232)*mix);
    const g=Math.round(230+(218-230)*mix);
    const b=Math.round(224+(211-224)*mix);
    document.body.style.backgroundColor=`rgb(${r},${g},${b})`;
    requestAnimationFrame(breath);
  }
  requestAnimationFrame(breath);
})();

// ── EASTER EGG: hover same card 3x without selecting
const cardHoverCount={};
document.querySelectorAll(".niche-card").forEach((card,i)=>{
  cardHoverCount[i]=0;
  card.addEventListener("mouseenter",()=>{
    if(!revealed[i]) return;
    cardHoverCount[i]++;

        nudge.textContent="You keep coming back to this one.";
        card.appendChild(nudge);
        requestAnimationFrame(()=>nudge.style.opacity="1");
      }
    }
  });
});
