<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>First Move — Skill Check</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#E8E6E0;
  --black:#0A0A0A;
  --muted:#6B6B6B;
  --divider:#C8C6C0;
  --secondary:#4A4A4A;
}
html,body{
  width:100%;min-height:100%;
  background:var(--cream);
  font-family:'Space Grotesk',sans-serif;
  overflow-x:hidden;
  cursor:none;
}

/* ── CURSOR ── */
#cursor{
  position:fixed;width:10px;height:10px;
  background:var(--black);border-radius:50%;
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  transition:width .15s,height .15s,background .2s;
}
#cursor.big{width:36px;height:36px;}
#cursor.light{background:var(--cream);}

/* ── GRAIN ── */
body::before{
  content:'';position:fixed;inset:-50%;
  width:200%;height:200%;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  opacity:.25;animation:grain .35s steps(1) infinite;pointer-events:none;z-index:0;
}
@keyframes grain{
  0%,100%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}20%{transform:translate(3%,1%)}
  30%{transform:translate(-1%,4%)}40%{transform:translate(2%,-2%)}50%{transform:translate(-3%,2%)}
  60%{transform:translate(1%,-4%)}70%{transform:translate(-2%,3%)}80%{transform:translate(3%,-1%)}90%{transform:translate(-1%,2%)}
}

/* ── HEADER ── */
#header{
  position:fixed;top:0;left:0;right:0;z-index:50;
  padding:20px 32px 0;
  background:var(--cream);
}
.header-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:.05em;color:var(--black);
}
.question-counter{
  font-size:11px;letter-spacing:.25em;text-transform:uppercase;
  color:var(--muted);font-weight:400;
}

/* PROGRESS BAR */
.progress-track{
  width:100%;height:2px;background:var(--divider);
  position:relative;overflow:hidden;
}
.progress-fill{
  position:absolute;left:0;top:0;height:100%;
  background:var(--black);
  transition:width .5s cubic-bezier(.22,1,.36,1);
  width:0%;
}
/* progress dots */
.progress-dots{
  display:flex;gap:0;margin-top:10px;
}
.progress-dot{
  flex:1;height:2px;background:var(--divider);
  margin-right:3px;border-radius:2px;
  transition:background .4s ease;
}
.progress-dot.done{background:var(--secondary);}
.progress-dot.active{background:var(--black);}

/* ── QUESTION STAGE ── */
#stage{
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;
  padding:100px 32px 80px;
  z-index:10;
  min-height:100vh;
}

/* QUESTION SLIDE */
.q-slide{
  display:none;
  flex-direction:column;
  align-items:center;
  width:100%;max-width:640px;
  padding:0;
  opacity:0;
  transition:opacity .4s ease;
}
.q-slide.active{
  display:flex;
  opacity:1;
  pointer-events:auto;
}
.q-slide.exiting{
  display:none;
}

.q-label{
  font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  color:var(--muted);font-weight:400;margin-bottom:16px;
  align-self:flex-start;max-width:600px;width:100%;
}
.q-text{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(22px,3.5vw,38px);
  color:var(--black);line-height:1.1;
  letter-spacing:.01em;
  text-align:center;
  align-self:center;max-width:600px;width:100%;
  margin-bottom:28px;
}

/* OPTIONS */
.options{
  display:flex;flex-direction:column;gap:10px;
  width:100%;max-width:600px;
  align-self:center;
}
.option{
  border:1.5px solid var(--divider);
  border-radius:16px;
  padding:18px 22px;
  cursor:none;
  transition:border-color .2s,background .2s,transform .15s;
  position:relative;overflow:hidden;
  background:transparent;
}
.option::before{
  content:'';position:absolute;inset:0;
  background:var(--black);
  transform:translateY(101%);
  transition:transform .3s cubic-bezier(.22,1,.36,1);
  border-radius:14px;
}
.option:hover{
  border-color:var(--secondary);
  transform:translateX(4px);
}
.option.selected{
  border-color:var(--black);
}
.option.selected::before{
  transform:translateY(0);
}
.option-letter{
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;letter-spacing:.1em;
  color:var(--muted);
  display:block;margin-bottom:5px;
  position:relative;z-index:1;
  transition:color .2s ease .1s;
}
.option-text{
  font-size:13px;font-weight:400;
  color:var(--black);line-height:1.5;
  position:relative;z-index:1;
  transition:color .2s ease .1s;
}
.option.selected .option-letter,
.option.selected .option-text{
  color:var(--cream);
}

/* BUTTON ROW */
.btn-row{
  margin-top:24px;
  align-self:stretch;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}

/* BACK BUTTON */
.q-back{
  background:transparent;color:var(--muted);
  border:1.5px solid var(--divider);
  padding:14px 24px;border-radius:50px;
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;
  cursor:none;
  opacity:0;transform:translateX(-8px);
  transition:opacity .3s ease, transform .3s ease, border-color .2s, color .2s;
  pointer-events:none;
}
.q-back.visible{
  opacity:1;transform:translateX(0);
  pointer-events:auto;
}
.q-back:hover{
  border-color:var(--secondary);
  color:var(--secondary);
  transform:translateX(-3px) !important;
}

/* NEXT BUTTON */
.q-next{
  background:var(--black);color:var(--cream);
  border:none;padding:14px 36px;border-radius:50px;
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;
  cursor:none;
  opacity:0;transform:translateY(8px);
  transition:opacity .3s ease, transform .3s ease, box-shadow .2s ease;
  pointer-events:none;
  margin-left:auto;
}
.q-next.visible{
  opacity:1;transform:translateY(0);
  pointer-events:auto;
  animation:btnPulse .6s ease .1s;
}
.q-next:hover{
  box-shadow:0 8px 28px rgba(10,10,10,.2);
  transform:translateY(-2px) !important;
}
@keyframes btnPulse{
  0%{box-shadow:0 0 0 0 rgba(10,10,10,.3);}
  50%{box-shadow:0 0 0 8px rgba(10,10,10,0);}
  100%{box-shadow:0 0 0 0 rgba(10,10,10,0);}
}

/* OPTION RIPPLE */
.option-ripple{
  position:absolute;border-radius:50%;
  background:rgba(10,10,10,.12);
  pointer-events:none;
  transform:translate(-50%,-50%) scale(0);
  animation:optRipple .5s ease forwards;
}
@keyframes optRipple{
  to{transform:translate(-50%,-50%) scale(4);opacity:0;}
}

/* DOT PULSE on complete */
.progress-dot.pulse{
  animation:dotPulse .4s ease forwards;
}
@keyframes dotPulse{
  0%{transform:scaleX(1);}
  40%{transform:scaleX(1.6);}
  100%{transform:scaleX(1);}
}

/* QUESTION COMPRESS before exit */
.q-slide.compressing{
  transform:scale(.97) translateX(0);
  opacity:.7;
  transition:transform .15s ease, opacity .15s ease;
}
.q-slide.entering-back{
  transform:translateX(-60px);
  opacity:0;
}
.q-slide.entering-back.active{
  transform:translateX(0);
  opacity:1;
  transition:opacity .4s ease, transform .4s cubic-bezier(.22,1,.36,1);
}
.q-slide.exiting-forward{
  transform:translateX(-80px) scale(.96);
  opacity:0;
  transition:opacity .35s ease, transform .35s cubic-bezier(.55,0,1,.45);
}
.q-slide.exiting-back{
  transform:translateX(80px) scale(.96);
  opacity:0;
  transition:opacity .35s ease, transform .35s cubic-bezier(.55,0,1,.45);
}

/* ── GREG PLITT QUOTE ── */
#quote-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  padding:16px 32px;
  border-top:1px solid var(--divider);
  background:var(--cream);
  display:flex;align-items:center;gap:12px;
}
.quote-line{
  font-size:11px;color:var(--muted);font-weight:300;
  font-style:italic;line-height:1.4;
}
.quote-attr{
  font-size:10px;color:var(--divider);
  letter-spacing:.1em;white-space:nowrap;
  font-style:normal;
}

/* ── SUBMIT / GRADING STATE ── */
#grading-screen{
  position:fixed;inset:0;z-index:200;
  background:var(--black);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .5s ease;
}
#grading-screen.active{
  opacity:1;pointer-events:auto;
}
.grading-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(40px,8vw,80px);
  color:var(--cream);letter-spacing:.02em;
  margin-bottom:24px;
  opacity:0;animation:none;
}
.grading-title.go{
  animation:fadeSlideUp .6s cubic-bezier(.22,1,.36,1) .2s forwards;
}
.grading-sub{
  font-size:13px;color:var(--muted);font-weight:300;
  letter-spacing:.1em;text-transform:uppercase;
  opacity:0;
}
.grading-sub.go{
  animation:fadeSlideUp .6s cubic-bezier(.22,1,.36,1) .5s forwards;
}
@keyframes fadeSlideUp{
  to{opacity:1;transform:translateY(0);}
  from{opacity:0;transform:translateY(16px);}
}

/* grading bar */
.grading-bar-wrap{
  width:200px;height:1px;background:rgba(232,230,224,.15);
  margin-top:40px;overflow:hidden;
  opacity:0;
}
.grading-bar-wrap.go{
  animation:fadeSlideUp .4s ease .7s forwards;
}
.grading-bar-fill{
  height:100%;width:0%;background:var(--cream);
  animation:none;
}
.grading-bar-fill.go{
  animation:barFill 2.5s cubic-bezier(.22,1,.36,1) .9s forwards;
}
@keyframes barFill{to{width:100%;}}

/* ── SCROLL REVEAL HELPER ── */
@keyframes slideInUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
</style>

<!-- THEME SYSTEM -->
<script>
(function(){
  var t=localStorage.getItem('fm_theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
})();
function fmToggleTheme(){
  var c=document.documentElement.getAttribute('data-theme')||'light';
  var n=c==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('fm_theme',n);
  var ic=document.getElementById('fm-theme-icon');
  var lb=document.getElementById('fm-theme-label');
  if(ic)ic.textContent=n==='dark'?'🌙':'☀️';
  if(lb)lb.textContent=n==='dark'?'Dark':'Light';
}
window.addEventListener('DOMContentLoaded',function(){
  var t=localStorage.getItem('fm_theme')||'light';
  var ic=document.getElementById('fm-theme-icon');
  var lb=document.getElementById('fm-theme-label');
  if(ic)ic.textContent=t==='dark'?'🌙':'☀️';
  if(lb)lb.textContent=t==='dark'?'Dark':'Light';
});
</script>
</head>
<body><button onclick="fmToggleTheme()" id="fm-toggle-btn" style="
  position:fixed;top:14px;right:16px;z-index:9999;
  display:flex;align-items:center;gap:5px;
  background:rgba(128,128,128,0.15);border:1px solid rgba(128,128,128,0.2);
  border-radius:20px;padding:5px 12px;cursor:pointer;
  font-size:11px;font-family:'Space Grotesk',sans-serif;font-weight:500;
  color:inherit;letter-spacing:0.05em;
  transition:background 0.2s;
"><span id="fm-theme-icon">☀️</span><span id="fm-theme-label">Light</span></button>
<div id="cursor"></div>

<!-- HEADER -->
<div id="header">
  <div class="header-row">
    <span class="logo">First Move</span>
    <span class="question-counter" id="q-counter">Question 1 of 6</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="progress-dots" id="progress-dots"></div>
</div>

<!-- QUESTION STAGE -->
<div id="stage"></div>

<!-- QUOTE BAR -->
<div id="quote-bar">
  <span class="quote-line">"You only live once, but if you work it right, once is enough."</span>
  <span class="quote-attr">— Greg Plitt</span>
</div>

<!-- GRADING SCREEN -->
<div id="grading-screen">
  <div class="grading-title" id="grading-title">Grading<br>Your Move.</div>
  <div class="grading-sub" id="grading-sub">Analysing your answers</div>
  <div class="grading-bar-wrap" id="grading-bar-wrap">
    <div class="grading-bar-fill" id="grading-bar-fill"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const WORKER   = 'https://firstmove-airtable.joinfirstmove.workers.dev';
const S3_HOOK  = 'https://hook.eu1.make.com/7x4tvsugf9e3qi4dwkljkoumgc481d9g';
const params   = new URLSearchParams(window.location.search);
const recordId = params.get('id') || '';

let QUESTIONS  = [];
let SKILL_AREA = 'Your Skills';
let pollCount  = 0;

// ══════════════════════════════════════════
// PARSE QUESTIONS FROM AIRTABLE
// ══════════════════════════════════════════
function parseQuestions(raw){
  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const questions = [];
  let current = null;

  for(let i=0; i<lines.length; i++){
    const line = lines[i];
    if(line.match(/^Q\d+:/i)){
      if(current) questions.push(current);
      current = { q: line.replace(/^Q\d+:\s*/i,''), opts:[], correct:0 };
    } else if(line.match(/^A\)/i) && current){
      current.opts[0] = line.replace(/^A\)\s*/i,'');
    } else if(line.match(/^B\)/i) && current){
      current.opts[1] = line.replace(/^B\)\s*/i,'');
    } else if(line.match(/^C\)/i) && current){
      current.opts[2] = line.replace(/^C\)\s*/i,'');
    } else if(line.match(/^Correct:/i) && current){
      const ans = line.replace(/^Correct:\s*/i,'').trim().toUpperCase();
      current.correct = ans === 'A' ? 0 : ans === 'B' ? 1 : 2;
    }
  }
  if(current) questions.push(current);
  return questions.filter(q=>q.opts.length===3);
}

function pollQuestions(){
  if(!recordId){ loadFallbackQuestions(); return; }
  fetch(`${WORKER}?id=${encodeURIComponent(recordId)}`)
    .then(r=>r.json())
    .then(data=>{
      const fields = data.fields || data;
      const raw    = fields['Skill Check Questions'] || fields['skill_check_questions'] || '';
      const area   = fields['skillArea'] || fields['Skills'] || 'Your Skills';
      if(raw && raw.trim().length > 50){
        const parsed = parseQuestions(raw);
        if(parsed.length >= 3){
          QUESTIONS  = parsed;
          SKILL_AREA = area;
          initQuiz();
        } else { retryPoll(); }
      } else { retryPoll(); }
    })
    .catch(retryPoll);
}

function retryPoll(){
  pollCount++;
  if(pollCount === 10){
    var el=document.getElementById('fm-loading-msg');
    if(el)el.textContent='Still generating your personalised results... hang tight.';
  }
  if(pollCount < 60) setTimeout(pollQuestions, 3000);
  else loadFallbackQuestions();
}

function loadFallbackQuestions(){
  QUESTIONS = [
    {q:"A client wants more engagement but their posts get zero comments. What's your first move?",opts:["Tell them to post more frequently and use more hashtags to increase their overall reach and visibility.","Audit their content format — engagement drops when posts don't invite a response. Add questions, polls, or opinion prompts.","Switch all content to video immediately, since video always outperforms static images on every platform."],correct:1},
    {q:"What's the difference between reach and impressions?",opts:["They're the same metric — both count the total number of times your content was displayed to users on the platform.","Reach is the number of unique accounts that saw the post. Impressions count total views including multiple views by one person.","Reach tracks organic views only while impressions include paid promotion, making impressions always the higher number."],correct:1},
    {q:"A client's Instagram growth has stalled at 800 followers for 3 months. What do you diagnose first?",opts:["The account needs a complete visual rebrand — stagnation is almost always caused by an inconsistent or unappealing aesthetic.","Check posting consistency, content mix, and whether they're actively engaging in comments on similar accounts in their niche.","Immediately run a giveaway campaign to force follower growth — this is the fastest proven method for breaking a plateau."],correct:1},
    {q:"Your client posts at 8am every day. Their insights show peak audience activity at 7pm. What do you do?",opts:["Keep posting at 8am — consistency matters more than timing and changing the schedule will confuse the algorithm.","Switch immediately to 7pm and tell the client the change will show results within 48 hours.","Test 7pm posting for two weeks, track the engagement difference, then present the data to the client before making it permanent."],correct:2},
    {q:"A client asks you to guarantee 10,000 followers in 30 days. How do you respond?",opts:["Accept the target — setting ambitious goals pushes you to work harder and clients respect confidence.","Explain that follower growth depends on content quality, consistency, and audience fit — you can guarantee the work, not the exact number.","Decline the project immediately — any client who sets follower targets is not worth working with."],correct:1},
    {q:"What does a content calendar actually do for a small business client?",opts:["It guarantees viral posts by pre-planning content around trending topics and algorithm peak times.","It creates posting consistency, reduces last-minute decisions, and lets the client review and approve content in advance.","It's mainly for the client's benefit — professional social media managers don't actually need to plan content in advance."],correct:1}
  ];
  initQuiz();
}

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let current = 0;
let answers  = [];
let selected = null;

function initQuiz(){
  answers = new Array(QUESTIONS.length).fill(null);
  buildQuestionScreens();
  document.getElementById('progress-fill').style.width = `${(1/QUESTIONS.length)*100}%`;
  document.getElementById('q-counter').textContent = `Question 1 of ${QUESTIONS.length}`;
}

// ══════════════════════════════════════════
// CURSOR
// ══════════════════════════════════════════
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
document.addEventListener('mouseover', e => {
  const isClickable = e.target.closest('.option, .q-next, button');
  cursor.classList.toggle('big', !!isClickable);
});

// ══════════════════════════════════════════
// BUILD PROGRESS DOTS
// ══════════════════════════════════════════
// BUILD QUESTION SCREENS — called after data loads
// ══════════════════════════════════════════
function buildQuestionScreens(){
  // Build progress dots
  const dotsEl = document.getElementById('progress-dots');
  dotsEl.innerHTML = '';
  QUESTIONS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'progress-dot' + (i === 0 ? ' active' : '');
    d.id = `dot-${i}`;
    dotsEl.appendChild(d);
  });

  // Build question slides
  const stage = document.getElementById('stage');
  stage.innerHTML = '';
  QUESTIONS.forEach((q, qi) => {
    const slide = document.createElement('div');
    slide.className = 'q-slide' + (qi === 0 ? ' active' : '');
    slide.id = `slide-${qi}`;
    slide.innerHTML = `
      <div class="q-label">${SKILL_AREA} — Q${qi+1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts-${qi}">
        ${q.opts.map((opt, oi) => `
          <div class="option" data-q="${qi}" data-i="${oi}">
            <span class="option-letter">${String.fromCharCode(65+oi)}</span>
            <span class="option-text">${opt}</span>
          </div>
        `).join('')}
      </div>
      <div class="btn-row">
        <button class="q-back" id="back-${qi}" ${qi === 0 ? 'style="visibility:hidden"' : ''}>← Back</button>
        <button class="q-next" id="next-${qi}">
          ${qi < QUESTIONS.length - 1 ? 'Next →' : 'Submit Answers'}
        </button>
      </div>
    `;
    stage.appendChild(slide);
  });
}

// ══════════════════════════════════════════
// OPTION CLICK + RIPPLE
// ══════════════════════════════════════════
const stage = document.getElementById('stage');
stage.addEventListener('click', e => {
  const opt = e.target.closest('.option');
  if(!opt) return;
  const qi = parseInt(opt.dataset.q);
  const oi = parseInt(opt.dataset.i);
  if(qi !== current) return;

  // Ripple effect at click point
  const rect = opt.getBoundingClientRect();
  const ripple = document.createElement('div');
  ripple.className = 'option-ripple';
  ripple.style.left = (e.clientX - rect.left) + 'px';
  ripple.style.top  = (e.clientY - rect.top)  + 'px';
  ripple.style.width = ripple.style.height = '60px';
  opt.appendChild(ripple);
  setTimeout(() => ripple.remove(), 500);

  // Deselect previous
  document.querySelectorAll(`#opts-${qi} .option`).forEach(o => o.classList.remove('selected'));

  // Select new
  opt.classList.add('selected');
  answers[qi] = oi;
  selected = oi;

  // Show next button (with pulse animation)
  const nextBtn = document.getElementById(`next-${qi}`);
  nextBtn.classList.remove('visible');
  void nextBtn.offsetWidth; // reset animation
  nextBtn.classList.add('visible');

  // Show back button (if not Q1)
  if(qi > 0){
    const backBtn = document.getElementById(`back-${qi}`);
    backBtn.classList.add('visible');
  }
});

// ══════════════════════════════════════════
// NEXT / SUBMIT
// ══════════════════════════════════════════
stage.addEventListener('click', e => {
  const btn = e.target.closest('.q-next');
  if(!btn) return;
  if(answers[current] === null) return;
  if(current < QUESTIONS.length - 1){
    goToQuestion(current + 1, 'forward');
  } else {
    submitAnswers();
  }
});

// ══════════════════════════════════════════
// BACK BUTTON
// ══════════════════════════════════════════
stage.addEventListener('click', e => {
  const btn = e.target.closest('.q-back');
  if(!btn || current === 0) return;
  goToQuestion(current - 1, 'back');
});

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function goToQuestion(next, direction){
  direction = direction || 'forward';
  const currentSlide = document.getElementById(`slide-${current}`);
  const nextSlide    = document.getElementById(`slide-${next}`);

  // Compress then exit
  currentSlide.classList.add('compressing');
  setTimeout(() => {
    currentSlide.classList.remove('compressing');
    currentSlide.classList.add(direction === 'forward' ? 'exiting-forward' : 'exiting-back');

    // Update dots
    if(direction === 'forward'){
      const dot = document.getElementById(`dot-${current}`);
      dot.classList.remove('active');
      dot.classList.add('done');
      // pulse the dot
      dot.classList.add('pulse');
      setTimeout(() => dot.classList.remove('pulse'), 400);
      document.getElementById(`dot-${next}`).classList.add('active');
    } else {
      document.getElementById(`dot-${current}`).classList.remove('active','done');
      document.getElementById(`dot-${next}`).classList.remove('done');
      document.getElementById(`dot-${next}`).classList.add('active');
    }

    // Counter
    document.getElementById('q-counter').textContent = `Question ${next+1} of ${QUESTIONS.length}`;

    // Progress bar
    const pct = direction === 'forward'
      ? ((next) / QUESTIONS.length) * 100
      : (next / QUESTIONS.length) * 100;
    document.getElementById('progress-fill').style.width = `${pct}%`;

    // Slide in next
    nextSlide.classList.add('entering-back'); // position off-screen
    void nextSlide.offsetWidth;
    setTimeout(() => {
      currentSlide.classList.remove('active','exiting-forward','exiting-back');
      nextSlide.classList.remove('entering-back');
      nextSlide.classList.add('active');
      current = next;
      selected = answers[next];

      // Restore button states
      const nextBtn = document.getElementById(`next-${next}`);
      const backBtn = document.getElementById(`back-${next}`);
      if(selected !== null){
        nextBtn.classList.add('visible');
        if(next > 0) backBtn.classList.add('visible');
      } else {
        nextBtn.classList.remove('visible');
        if(next > 0) backBtn.classList.add('visible');
        else backBtn.classList.remove('visible');
      }
    }, 50);
  }, 150); // compress duration before exit
}

// ══════════════════════════════════════════
// SUBMIT
// ══════════════════════════════════════════
function submitAnswers(){
  // Final dot + bar
  document.getElementById(`dot-${current}`).classList.remove('active');
  document.getElementById(`dot-${current}`).classList.add('done');
  document.getElementById('progress-fill').style.width = '100%';

  // Show grading screen
  const gs = document.getElementById('grading-screen');
  gs.classList.add('active');

  setTimeout(() => {
    document.getElementById('grading-title').classList.add('go');
    document.getElementById('grading-sub').classList.add('go');
    document.getElementById('grading-bar-wrap').classList.add('go');
    document.getElementById('grading-bar-fill').classList.add('go');
  }, 100);

  // POST answers to S3 — Grading + Learning Path
  // Send user's answer letter AND the correct answer letter for each question
  // so S3 can grade by correctness not position
  function idxToLetter(i){ return i === 0 ? 'A' : i === 1 ? 'B' : 'C'; }
  const payload = {
    id: recordId,
    q1: idxToLetter(answers[0]), correct1: idxToLetter(QUESTIONS[0]?.correct ?? 0),
    q2: idxToLetter(answers[1]), correct2: idxToLetter(QUESTIONS[1]?.correct ?? 0),
    q3: idxToLetter(answers[2]), correct3: idxToLetter(QUESTIONS[2]?.correct ?? 0),
    q4: idxToLetter(answers[3]), correct4: idxToLetter(QUESTIONS[3]?.correct ?? 0),
    q5: idxToLetter(answers[4]), correct5: idxToLetter(QUESTIONS[4]?.correct ?? 0),
    q6: idxToLetter(answers[5]), correct6: idxToLetter(QUESTIONS[5]?.correct ?? 0),
    skillArea: SKILL_AREA
  };

  fetch(S3_HOOK, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).catch(err => console.warn('S3 webhook error:', err));

  // Redirect to results after grading animation
  setTimeout(() => {
    window.location.href = `results.html?id=${encodeURIComponent(recordId)}`;
  }, 3800);
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight' || e.key === 'Enter'){
    if(answers[current] !== null){
      if(current < QUESTIONS.length - 1) goToQuestion(current + 1, 'forward');
      else submitAnswers();
    }
  }
  if(e.key === 'ArrowLeft' && current > 0){
    goToQuestion(current - 1, 'back');
  }
  if(['1','2','3'].includes(e.key)){
    const idx = parseInt(e.key) - 1;
    const opts = document.querySelectorAll(`#opts-${current} .option`);
    if(opts[idx]) opts[idx].click();
  }
});

// Start — fetch questions from Airtable
pollQuestions();

// ── BREATHING BACKGROUND (cream)
(function(){
  let t = Math.random() * Math.PI * 2; // random phase each load
  function breath(){
    t += 0.006 + Math.random()*0.002; // slight speed variation each load
    const mix=(Math.sin(t)+1)/2;
    const r=Math.round(232+(222-232)*mix);
    const g=Math.round(230+(218-230)*mix);
    const b=Math.round(224+(211-224)*mix);
    document.body.style.backgroundColor=`rgb(${r},${g},${b})`;
    requestAnimationFrame(breath);
  }
  requestAnimationFrame(breath);
})();

// ── EASTER EGG: Impatient question shake after 30s no answer
let idleTimer, idleShook = false;
function resetIdleTimer(){
  clearTimeout(idleTimer);
  if(idleShook) return;
  idleTimer = setTimeout(()=>{
    if(answers[current]!==null) return;
    idleShook = true;
    const slide = document.getElementById(`slide-${current}`);
    if(!slide) return;
    // Frenzied, irritated shake — erratic, high magnitude, irregular timing
    let shakes = 0;
    const totalShakes = 22;
    function frenzyShake(){
      if(shakes >= totalShakes){
        slide.style.transform='';
        idleShook=false;
        return;
      }
      // Erratic: random magnitude per hit, random delay between hits
      const mag = 8 + Math.random()*18;
      const tx = (Math.random()-.5)*2*mag;
      const ty = (Math.random()-.5)*mag*.5;
      const rot = (Math.random()-.5)*1.2;
      slide.style.transform=`translate(${tx}px,${ty}px) rotate(${rot}deg)`;
      shakes++;
      // Irregular timing — some fast, some slightly slower, feels frantic
      setTimeout(frenzyShake, 28 + Math.random()*50);
    }
    frenzyShake();
  }, 30000);
}
document.addEventListener('click', resetIdleTimer);
document.addEventListener('keydown', resetIdleTimer);
resetIdleTimer();
