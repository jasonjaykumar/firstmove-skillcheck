<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Results — First Move</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #E8E6E0;
            font-family: 'Inter', sans-serif;
            color: #0A0A0A;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .logo {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 48px;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }
        .badge-ready { background: #0A0A0A; color: #E8E6E0; }
        .badge-almost { background: #4A4A4A; color: #E8E6E0; }
        .badge-not-ready { background: #6B6B6B; color: #E8E6E0; }
        .header {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 16px;
            line-height: 1.2;
        }
        .score {
            font-size: 17px;
            color: #4A4A4A;
            margin-bottom: 24px;
        }
        .breakdown {
            font-size: 15px;
            line-height: 1.8;
            color: #4A4A4A;
            margin-bottom: 24px;
        }
        .main-message {
            font-size: 16px;
            line-height: 1.8;
            color: #0A0A0A;
            margin-bottom: 40px;
            padding: 24px;
            background: #0A0A0A0D;
            border-radius: 16px;
        }
        .resources-section { margin-bottom: 40px; }
        .resources-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .resources-sub {
            font-size: 14px;
            color: #6B6B6B;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .day-card {
            padding: 20px 24px;
            border: 1.5px solid #C8C6C0;
            border-radius: 16px;
            margin-bottom: 12px;
        }
        .day-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #6B6B6B;
            margin-bottom: 8px;
        }
        .day-content {
            font-size: 15px;
            line-height: 1.7;
            color: #0A0A0A;
        }
        .day-content a {
            color: #0A0A0A;
            font-weight: 600;
            text-decoration: underline;
        }
        .day-content a:hover { opacity: 0.7; }
        .btn-primary {
            display: block;
            width: 100%;
            padding: 18px;
            background: #0A0A0A;
            color: #E8E6E0;
            border: none;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-bottom: 16px;
            transition: opacity 0.2s ease;
        }
        .btn-primary:hover { opacity: 0.85; }
        .btn-secondary {
            display: block;
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #6B6B6B;
            border: 1.5px solid #C8C6C0;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-secondary:hover { border-color: #0A0A0A; color: #0A0A0A; }
        .btn-tiny {
            display: block;
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #9B9B9B;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            text-decoration: underline;
            margin-top: 8px;
        }
        .loading {
            text-align: center;
            padding: 80px 0;
            color: #6B6B6B;
            font-size: 16px;
        }
        .divider {
            height: 1px;
            background: #C8C6C0;
            margin: 40px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">FIRST MOVE</div>
        <div id="content"><div class="loading">Loading your results...</div></div>
    </div>

    <script>
        const WORKER_URL = 'https://firstmove-airtable.joinfirstmove.workers.dev';
        const urlParams = new URLSearchParams(window.location.search);
        const recordId = urlParams.get('id');

        function capitalizeName(name) {
            if (!name) return 'there';
            return name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
        }

        function parseLearningPath(grade) {
            const pathMatch = grade.match(/LEARNING_PATH:\n([\s\S]+)/);
            if (!pathMatch) return [];

            const pathText = pathMatch[1].trim();
            const days = pathText.split(/\n(?=Day \d)/);

            return days.map(day => {
                const colonIndex = day.indexOf(':');
                const label = day.substring(0, colonIndex).trim();
                const content = day.substring(colonIndex + 1).trim();

                // Convert URLs to clickable links
                const linkedContent = content.replace(
                    /(https?:\/\/[^\s]+)/g,
                    '<a href="$1" target="_blank">$1</a>'
                );

                return { label, content: linkedContent };
            }).filter(d => d.label && d.content);
        }

        async function loadResults() {
            const content = document.getElementById('content');

            if (!recordId) {
                content.innerHTML = '<p>No record found. Please use the link sent to your email.</p>';
                return;
            }

            try {
                const response = await fetch(`${WORKER_URL}/?id=${recordId}`);
                const data = await response.json();
                const grade = data.fields['Grade'] || '';
                const name = capitalizeName(data.fields['Name']);

                let status = 'NOT_READY';
                let score = '';
                let breakdown = '';

                const scoreMatch = grade.match(/SCORE:\s*(\d+\/12)/);
                if (scoreMatch) score = scoreMatch[1];

                const statusMatch = grade.match(/STATUS:\s*(READY|ALMOST|NOT_READY)/);
                if (statusMatch) status = statusMatch[1];

                const breakdownMatch = grade.match(/BREAKDOWN:\s*([\s\S]+?)(?=\nLEARNING_PATH:)/);
                if (breakdownMatch) breakdown = breakdownMatch[1].trim();

                const learningPath = parseLearningPath(grade);

                renderResults(status, score, name, breakdown, learningPath);

            } catch (err) {
                content.innerHTML = '<p>Something went wrong. Please try again.</p>';
            }
        }

        function renderLearningPath(days, title, sub) {
            if (!days.length) return '';
            return `
                <div class="resources-section">
                    <div class="resources-title">${title}</div>
                    <div class="resources-sub">${sub}</div>
                    ${days.map(day => `
                        <div class="day-card">
                            <div class="day-label">${day.label.toUpperCase()}</div>
                            <div class="day-content">${day.content}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderResults(status, score, name, breakdown, learningPath) {
            const content = document.getElementById('content');

            if (status === 'READY') {
                content.innerHTML = `
                    <div class="status-badge badge-ready">READY</div>
                    <div class="header">You're ready, ${name}.</div>
                    <div class="score">Score: ${score}</div>
                    <div class="breakdown">${breakdown}</div>
                    <div class="main-message">You're ready, and that's not something we say lightly. Your answers show you actually understand this, not just on the surface. Before you go, here are a few resources worth bookmarking. The best hustlers never stop learning even when they're already earning.</div>
                    ${renderLearningPath(learningPath, 'Keep sharpening.', 'You\'re ready to start. These will make you even better while you do.')}
                    <div class="divider"></div>
                    <a class="btn-primary" href="recommendations.html?id=${recordId}">Show Me My Moves →</a>
                `;
            } else if (status === 'ALMOST') {
                content.innerHTML = `
                    <div class="status-badge badge-almost">ALMOST THERE</div>
                    <div class="header">You're close, ${name}.</div>
                    <div class="score">Score: ${score}</div>
                    <div class="breakdown">${breakdown}</div>
                    <div class="main-message">You're closer than you think, but close isn't ready yet. There are a couple of gaps in your understanding that your first client will notice before you do. That's not a knock, it's just honest. One focused week with the right resources and you'll be in a completely different place. The teens who take this week seriously land clients faster, charge more, and don't have to deal with the confidence hit that comes from delivering work they weren't quite ready for.</div>
                    ${renderLearningPath(learningPath, 'One week here changes everything.', 'All free. Follow this plan and you\'ll feel the difference by day 7.')}
                    <div class="divider"></div>
                    <a class="btn-primary" href="recommendations.html?id=${recordId}">I'm ready, show me my moves →</a>
                    <a class="btn-secondary" href="recommendations.html?id=${recordId}">Skip and continue anyway</a>
                `;
            } else {
                content.innerHTML = `
                    <div class="status-badge badge-not-ready">NOT YET</div>
                    <div class="header">Not quite yet, ${name}.</div>
                    <div class="score">Score: ${score}</div>
                    <div class="breakdown">${breakdown}</div>
                    <div class="main-message">We're not going to sugarcoat this. The skill isn't there yet, and that's completely okay because everyone starts here. But going out and trying to charge for something you haven't fully built yet doesn't just waste your time, it damages your reputation before it's even started. The good news is the gap is completely closeable. Two to four focused weeks with the right resources and you'll come back a different person. We'll still be here when you're ready, and you will be ready.</div>
                    ${renderLearningPath(learningPath, 'Your path forward.', 'Follow this plan. Come back when you\'ve done it. You\'ll be a different person.')}
                    <div class="divider"></div>
                    <a class="btn-primary" href="index.html?id=${recordId}">Retake the Skill Check</a>
                    <a class="btn-secondary" href="recommendations.html?id=${recordId}">I understand the risk, show me anyway</a>
                    <a class="btn-tiny" href="recommendations.html?id=${recordId}">Skip everything and continue</a>
                `;
            }
        }

        loadResults();
    </script>
</body>
</html>
